name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cli_name: aion-cli-linux-x86_64
            server_name: aion-server-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cli_name: aion-cli-windows-x86_64.exe
            server_name: aion-server-windows-x86_64.exe
          - os: macos-13
            target: x86_64-apple-darwin
            cli_name: aion-cli-macos-x86_64
            server_name: aion-server-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            cli_name: aion-cli-macos-aarch64
            server_name: aion-server-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p aion-cli -p aion-server

      # --- Rename CLI ---
      - name: Rename CLI (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/aion-cli ${{ matrix.cli_name }}

      - name: Rename CLI (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/aion-cli.exe ${{ matrix.cli_name }}

      # --- Rename Server ---
      - name: Rename Server (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/aion-server ${{ matrix.server_name }}

      - name: Rename Server (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/aion-server.exe ${{ matrix.server_name }}

      # --- Upload artifacts ---
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.cli_name }}
          path: ${{ matrix.cli_name }}

      - name: Upload Server artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.server_name }}
          path: ${{ matrix.server_name }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate SHA256 checksums
        run: |
          cd release-artifacts
          echo "# SHA256 Checksums for Aion Forge ${{ github.ref_name }}" > ../checksums-sha256.txt
          echo "" >> ../checksums-sha256.txt
          for dir in */; do
            for file in "$dir"*; do
              if [ -f "$file" ]; then
                sha256sum "$file" >> ../checksums-sha256.txt
              fi
            done
          done
          cat ../checksums-sha256.txt

      - name: Update safety-manifest.json with checksums
        run: |
          bash scripts/update-checksums.sh release-artifacts safety-manifest.json

      - name: Package platform zip archives
        run: |
          bash scripts/package.sh release-artifacts ${{ github.ref_name }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*
            dist/*.zip
            checksums-sha256.txt
            safety-manifest.json
            install.sh
            install.ps1
          generate_release_notes: true
          draft: false
          prerelease: false
