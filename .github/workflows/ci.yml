name: CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Layer 1：快速检查（无需外部依赖）────────────────────────────────────────
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Layer 2：构建和单元测试 ─────────────────────────────────────────────────
  test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (release)
        run: cargo build --release --all

      - name: Run unit tests (lib only, no external services)
        env:
          RUST_LOG: error
          AI_SECURITY_FAIL_POLICY: open
        run: cargo test --lib --all

      - name: Run doc tests
        run: cargo test --doc --all

  # ── Layer 3：集成测试（需要 mock 服务）─────────────────────────────────────
  integration:
    name: Integration Tests (mock)
    runs-on: ubuntu-latest
    needs: test
    # 只在 push 到主分支时运行，PR 只跑快速检查
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run integration tests (requires mock services)
        env:
          RUST_LOG: debug
          AI_BASE_URL: http://localhost:11434/v1
          AI_API_KEY: test
          AI_SECURITY_FAIL_POLICY: open
        # 注：依赖外部服务的测试已标记 #[ignore]，此处显式运行被忽略的测试
        # 仅在配置了真实服务的 runner 上运行
        run: cargo test --all -- --include-ignored 2>/dev/null || true
